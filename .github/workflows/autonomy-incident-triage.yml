name: Autonomy Incident Triage

# ─────────────────────────────────────────────────────────
# Triage bot for autonomy incidents.
# Adds structured incident metadata and delegates coding
# follow-up to Copilot via mention command.
# ─────────────────────────────────────────────────────────

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  triage:
    if: contains(github.event.issue.labels.*.name, 'autonomy-alert')
    runs-on: ubuntu-latest
    name: 🧭 Incident Triage

    steps:
      - name: Post triage checklist and Copilot delegation
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;

            const body = [
              'Automated incident triage checklist:',
              '',
              '- [ ] Reproduce failing autonomy check locally (`npm run autonomy:check`)',
              '- [ ] Confirm whether self-heal already attempted remediation',
              '- [ ] Review generated recovery playbooks in issue body',
              '- [ ] Determine if failure is code drift or external dependency outage',
              '- [ ] Attach root cause summary before closure',
              '',
              '@copilot Please propose a PR to fix this autonomy incident with the smallest safe change set, include tests/verification, and explain root cause.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body,
            });

            const requiredPromptFiles = [
              '.github/prompts/triage-autonomy-incident.prompt.md',
              '.github/prompts/apply-autonomy-self-heal.prompt.md',
              '.github/prompts/risk-gate-review.prompt.md',
            ];

            async function promptFileExists(filePath) {
              try {
                await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: filePath,
                });
                return true;
              } catch (error) {
                if (error && error.status === 404) return false;
                core.warning(`Prompt lookup failed for ${filePath}: ${error?.message || 'unknown error'}`);
                return false;
              }
            }

            const missingPromptFiles = [];
            for (const filePath of requiredPromptFiles) {
              if (!(await promptFileExists(filePath))) missingPromptFiles.push(filePath);
            }

            if (missingPromptFiles.length === 0) {
              const promptPlaybook = [
                'Copilot prompt playbook for this incident:',
                '',
                '1. `/Triage Autonomy Incident`',
                '2. `/Apply Autonomy Self-Heal`',
                '3. `/Risk Gate Review`',
                '',
                'Prompt references:',
                ...requiredPromptFiles.map((filePath) => `- ${filePath}`),
              ].join('\n');

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: promptPlaybook,
              });
            } else {
              const fallback = [
                'Prompt playbook unavailable: required prompt files are missing.',
                '',
                'Missing files:',
                ...missingPromptFiles.map((filePath) => `- ${filePath}`),
                '',
                'Fallback actions:',
                '- Re-run autonomy contract check (`npm run autonomy:check`).',
                '- Restore missing prompt files under .github/prompts/.',
                '- Continue triage manually using the checklist above.',
              ].join('\n');

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: fallback,
              });
            }

            const labels = new Set((issue.labels || []).map((l) => l.name));
            if (!labels.has('triaged')) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: ['triaged'],
              });
            }
