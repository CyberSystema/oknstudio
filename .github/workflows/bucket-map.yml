name: Bucket Map

# ─────────────────────────────────────────────────────────
# Generates a styled HTML directory map of the B2 bucket
# and uploads it to a shared Google Drive folder.
#
# Triggers:
#   • Daily at 06:00 UTC
#   • Manual dispatch
#
# Required secrets:
#   B2_KEY_ID, B2_APP_KEY, B2_ENDPOINT, B2_BUCKET,
#   RCLONE_GDRIVE_TOKEN
#
# Required variables:
#   GDRIVE_REMOTE_NAME  (e.g. gdrive-okn)
#   GDRIVE_BUCKET_MAP_FOLDER  (e.g. OKN Videos and Posts)
# ─────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC
  workflow_dispatch:

concurrency:
  group: bucket-map
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    name: 🗂️ Generate Bucket Map
    timeout-minutes: 10

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RCLONE_FAST_LIST: 'true'

    steps:
      - name: ☦️ Checkout
        uses: actions/checkout@v4

      - name: 🔧 Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          echo "rclone $(rclone version --check | head -1 || rclone version | head -1)"

      - name: 🔑 Configure B2 remote
        env:
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APP_KEY: ${{ secrets.B2_APP_KEY }}
        run: |
          rclone config create b2-okn b2 \
            account "$B2_KEY_ID" \
            key "$B2_APP_KEY"

      - name: 🔑 Configure Google Drive remote
        env:
          RCLONE_GDRIVE_TOKEN: ${{ secrets.RCLONE_GDRIVE_TOKEN }}
          GDRIVE_REMOTE: ${{ vars.GDRIVE_REMOTE_NAME || 'gdrive-okn' }}
        run: |
          rclone config create "$GDRIVE_REMOTE" drive \
            scope drive \
            token "$RCLONE_GDRIVE_TOKEN" \
            shared_with_me true \
            skip_gdocs true \
            skip_shortcuts true \
            skip_dangling_shortcuts true \
            list_chunk 1000 \
            disable_http2 true

      - name: ✅ Verify remotes
        env:
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
          GDRIVE_REMOTE: ${{ vars.GDRIVE_REMOTE_NAME || 'gdrive-okn' }}
        run: |
          echo "Configured remotes:"
          rclone listremotes

          echo ""
          echo "Testing B2 access..."
          rclone lsd "b2-okn:${B2_BUCKET}" --max-depth 1 && echo "✅ B2 OK" || echo "❌ B2 failed"

          echo ""
          echo "Testing Google Drive access..."
          rclone lsd "${GDRIVE_REMOTE}:" --max-depth 1 && echo "✅ Drive OK" || echo "❌ Drive failed"

      - name: 📂 Generate and upload bucket map
        env:
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
          GDRIVE_REMOTE_NAME: ${{ vars.GDRIVE_REMOTE_NAME || 'gdrive-okn' }}
          GDRIVE_FOLDER: ${{ vars.GDRIVE_BUCKET_MAP_FOLDER || 'OKN Videos and Posts' }}
        run: |
          python3 tools/bucket-map.py \
            --gdrive-remote "${GDRIVE_REMOTE_NAME}" \
            --drive-folder "${GDRIVE_FOLDER}"

      - name: 📋 Summary
        if: always()
        run: |
          echo "## 🗂️ Bucket Map" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          FOLDER="${{ vars.GDRIVE_BUCKET_MAP_FOLDER || 'OKN Videos and Posts' }}"
          echo "Uploaded \`bucket-map.html\` to **${FOLDER}** on Google Drive." >> $GITHUB_STEP_SUMMARY
