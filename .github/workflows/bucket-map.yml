name: Bucket Map

# ─────────────────────────────────────────────────────────
# Generates a styled HTML directory map of the B2 bucket
# and uploads it to a shared Google Drive folder.
#
# Triggers:
#   • Daily at 06:00 UTC
#   • Manual dispatch
#
# Required secrets:
#   B2_KEY_ID, B2_APP_KEY, B2_BUCKET,
#   RCLONE_GDRIVE_TOKEN
#
# Required variables:
#   GDRIVE_REMOTE_NAME  (e.g. gdrive-okn)
#   GDRIVE_BUCKET_MAP_FOLDER  (e.g. OKN Videos and Posts)
# ─────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC
  workflow_dispatch:

concurrency:
  group: bucket-map
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    name: 🗂️ Generate Bucket Map
    timeout-minutes: 30

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RCLONE_FAST_LIST: 'true'

    steps:
      - name: ☦️ Checkout
        uses: actions/checkout@v4

      - name: 🔧 Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          echo "rclone $(rclone version --check | head -1 || rclone version | head -1)"

      - name: 🔑 Configure rclone remotes (non-interactive)
        env:
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APP_KEY: ${{ secrets.B2_APP_KEY }}
          RCLONE_GDRIVE_TOKEN: ${{ secrets.RCLONE_GDRIVE_TOKEN }}
          GDRIVE_REMOTE: ${{ vars.GDRIVE_REMOTE_NAME || 'gdrive-okn' }}
        run: |
          # Write the rclone config file directly.
          # Using `rclone config create` for Drive triggers an interactive OAuth browser
          # flow even when a token is supplied — it hangs in CI. Writing the config file
          # directly is the standard non-interactive pattern for headless environments.
          mkdir -p ~/.config/rclone

          cat > ~/.config/rclone/rclone.conf << RCLONE_EOF
          [b2-okn]
          type = b2
          account = ${B2_KEY_ID}
          key = ${B2_APP_KEY}

          [${GDRIVE_REMOTE}]
          type = drive
          scope = drive
          token = ${RCLONE_GDRIVE_TOKEN}
          shared_with_me = true
          skip_gdocs = true
          skip_shortcuts = true
          skip_dangling_shortcuts = true
          list_chunk = 1000
          disable_http2 = true
          RCLONE_EOF

          # Strip leading whitespace (heredoc indentation)
          sed -i 's/^          //' ~/.config/rclone/rclone.conf

          echo "✅ rclone config written"
          rclone listremotes

      - name: ✅ Verify remotes
        env:
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
          GDRIVE_REMOTE: ${{ vars.GDRIVE_REMOTE_NAME || 'gdrive-okn' }}
        run: |
          echo "Testing B2 access..."
          timeout 45s rclone lsd "b2-okn:${B2_BUCKET}" --max-depth 1 && echo "✅ B2 OK" || echo "❌ B2 failed or timed out"

          echo ""
          echo "Testing Google Drive access..."
          timeout 45s rclone lsd "${GDRIVE_REMOTE}:" --max-depth 1 && echo "✅ Drive OK" || echo "❌ Drive failed or timed out"

      - name: 📂 Generate and upload bucket map
        env:
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
          GDRIVE_REMOTE_NAME: ${{ vars.GDRIVE_REMOTE_NAME || 'gdrive-okn' }}
          GDRIVE_FOLDER: ${{ vars.GDRIVE_BUCKET_MAP_FOLDER || 'OKN Videos and Posts' }}
        run: |
          timeout 20m python3 tools/bucket-map.py \
            --gdrive-remote "${GDRIVE_REMOTE_NAME}" \
            --drive-folder "${GDRIVE_FOLDER}"

      - name: 📋 Summary
        if: always()
        run: |
          echo "## 🗂️ Bucket Map" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          FOLDER="${{ vars.GDRIVE_BUCKET_MAP_FOLDER || 'OKN Videos and Posts' }}"
          echo "Uploaded \`bucket-map.txt\` to **${FOLDER}** on Google Drive." >> $GITHUB_STEP_SUMMARY
