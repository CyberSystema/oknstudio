name: Weekly Orthodox Korea Digest

on:
  schedule:
    - cron: '15 0 * * 1' # Monday 09:15 KST = 00:15 UTC
  workflow_dispatch:

concurrency:
  group: weekly-digest
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  send-digest:
    runs-on: ubuntu-latest
    name: ✉️ Send Weekly Digest
    timeout-minutes: 30

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      WEEKLY_DIGEST_SITE_URL: https://orthodoxkorea.org
      WEEKLY_DIGEST_LOOKBACK_DAYS: '7'
      WEEKLY_DIGEST_RECIPIENTS: ${{ secrets.WEEKLY_DIGEST_RECIPIENTS }}
      WEEKLY_DIGEST_FROM: ${{ secrets.WEEKLY_DIGEST_FROM }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      WEEKLY_DIGEST_SUMMARY_MAX_SENTENCES: '5'
      WEEKLY_DIGEST_SUMMARY_MODEL: intfloat/multilingual-e5-large-instruct

    steps:
      - name: ☦️ Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🗂️ Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ env.WEEKLY_DIGEST_SUMMARY_MODEL }}

      - name: 🤖 Install local summarizer model deps
        run: |
          python -m pip install --upgrade pip
          pip install sentence-transformers>=2.2.0 numpy>=1.24.0

      - name: ✉️ Run weekly digest
        run: node tools/weekly-digest.mjs

      - name: 📋 Summary
        if: always()
        run: |
          echo "## ✉️ Weekly Orthodox Korea Digest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Job | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | \\`${{ github.event_name }}\\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Schedule | Mondays 00:15 UTC (09:15 KST) |" >> $GITHUB_STEP_SUMMARY
