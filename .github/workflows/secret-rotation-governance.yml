name: Secret Rotation Governance

# ─────────────────────────────────────────────────────────
# Monthly governance bot for credentials and secrets.
# Opens/refreshes a tracked rotation issue checklist.
# ─────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  govern:
    runs-on: ubuntu-latest
    name: 🔐 Rotation Governance

    steps:
      - name: Open or refresh rotation issue
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Monthly secret rotation governance';
            const label = 'secrets-rotation';
            const now = new Date().toISOString();

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: label, per_page: 100,
            });

            const existing = issues.find((i) => i.title === title) || null;

            const body = [
              'Automated monthly governance checklist for secret/token hygiene.',
              '',
              `- Generated at: ${now}`,
              '',
              '- [ ] Rotate SITE_PASSWORD_HASH and ADMIN_PASSWORD_HASH',
              '- [ ] Rotate TOKEN_SECRET',
              '- [ ] Rotate GITHUB_PAT',
              '- [ ] Rotate B2 credentials (Pages and Actions scopes)',
              '- [ ] Rotate RESEND_API_KEY and ANTHROPIC_API_KEY',
              '- [ ] Validate DIGEST_CRON_SECRET parity between Worker and Pages',
              '- [ ] Confirm no unexpected secret access in recent audit logs',
            ].join('\n');

            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: [label, 'ops'],
            });
