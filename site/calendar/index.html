<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Calendar — OKN Studio</title>
<meta name="robots" content="noindex">
<meta name="color-scheme" content="dark">
<style>
  html,body{margin:0;height:100%;background:#0a0f14;color:#cbd5e1;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
  .chrome{position:sticky;top:0;z-index:10;background:rgba(10,15,20,0.76);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,0.08);}
  .chrome-inner{max-width:1440px;margin:0 auto;padding:12px 28px;display:flex;align-items:center;}
  .brand{display:flex;align-items:center;gap:10px;color:#e8edf2;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;letter-spacing:0.12em;}
  .brand svg{width:22px;height:22px}
  .brand .slash{color:#2b323a}
  .brand .studio{color:#5eead4}
  main{min-height:calc(100% - 52px);display:grid;place-items:center;text-align:center;padding:2rem;}
  h1{font-weight:500;letter-spacing:.02em;margin:0 0 .5rem;}
  p{color:#64748b;margin:0;}
  a{color:#5eead4;text-decoration:none;}
</style>
</head>
<body>
  <header class="chrome">
    <div class="chrome-inner">
      <div class="brand">
        <svg viewBox="0 0 32 32" fill="none" stroke="#5eead4" stroke-width="1.5">
          <line x1="16" y1="4" x2="16" y2="12"></line>
          <line x1="16" y1="20" x2="16" y2="28"></line>
          <line x1="4" y1="16" x2="12" y2="16"></line>
          <line x1="20" y1="16" x2="28" y2="16"></line>
          <circle cx="16" cy="4" r="2" fill="#5eead4" stroke="none"></circle>
          <circle cx="16" cy="28" r="2" fill="#5eead4" stroke="none"></circle>
          <circle cx="4" cy="16" r="2" fill="#5eead4" stroke="none"></circle>
          <circle cx="28" cy="16" r="2" fill="#5eead4" stroke="none"></circle>
          <circle cx="16" cy="16" r="3" fill="#5eead4" stroke="none"></circle>
        </svg>
        <span>OKN<span class="slash">/</span><span class="studio">Studio</span></span>
      </div>
    </div>
  </header>
  <main>
    <div>
      <h1>Calendar</h1>
      <p>Placeholder — not yet available.</p>
      <p style="margin-top:1.5rem;"><a href="/">← Back to OKN Studio</a></p>
    </div>
  </main>
</body>
</html>
