<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>404 — OKN Studio</title>
<meta name="theme-color" content="#0a0f14">
<meta name="color-scheme" content="dark">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<link rel="mask-icon" href="/favicon.svg" color="#5eead4">
<meta property="og:title" content="Signal Lost — OKN Studio">
<meta property="og:description" content="This route does not exist on the network.">
<meta property="og:image" content="https://oknstudio.cybersystema.com/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://oknstudio.cybersystema.com/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0f14;--bg-2:#0e141b;--bg-3:#121821;
  --signal:#5eead4;--signal-bright:#a7f3d0;--signal-dim:rgba(94,234,212,0.12);
  --text:#e8edf2;--text-dim:rgba(232,237,242,0.55);--text-faint:rgba(232,237,242,0.32);
  --text-ghost:rgba(232,237,242,0.18);
  --line:rgba(255,255,255,0.06);--line-2:rgba(255,255,255,0.1);--line-signal:rgba(94,234,212,0.2);
  --font-display:'Sora',sans-serif;--font-body:'IBM Plex Sans',sans-serif;--font-mono:'IBM Plex Mono',monospace;
}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;position:relative;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;mask-image:radial-gradient(ellipse at center,black 30%,transparent 85%)}
body::after{content:'';position:fixed;top:-300px;right:-300px;width:800px;height:800px;background:radial-gradient(circle,rgba(94,234,212,0.05) 0%,transparent 60%);pointer-events:none;z-index:0}

.chrome{position:fixed;top:0;left:0;right:0;z-index:10;background:rgba(10,15,20,0.7);backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}
.chrome-inner{max-width:1400px;margin:0 auto;padding:12px 32px;display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:11px;color:var(--text-dim)}
.brand{display:flex;align-items:center;gap:10px;color:var(--text)}
.brand svg{width:22px;height:22px}
.brand .slash{color:var(--text-ghost)}
.brand .studio{color:var(--signal)}
.err-code{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-faint)}
.err-code .val{color:#f87171}

.wrap{position:relative;z-index:1;text-align:center;max-width:640px;padding-top:48px}

.status-tag{display:inline-flex;align-items:center;gap:10px;padding:6px 14px;border:1px solid rgba(248,113,113,0.3);background:rgba(248,113,113,0.08);border-radius:3px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#f87171;margin-bottom:32px}
.status-tag .dot{width:6px;height:6px;border-radius:50%;background:#f87171;box-shadow:0 0 8px #f87171;animation:pulse 2s ease-in-out infinite}

.num-row{display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:28px}
.num-bracket{font-family:var(--font-mono);font-size:48px;color:var(--signal);opacity:0.4;font-weight:300;line-height:1}
.num{font-family:var(--font-display);font-size:clamp(120px,18vw,200px);font-weight:300;line-height:0.9;color:var(--text);letter-spacing:-0.06em}
.num .accent{color:var(--signal)}

.rule{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--line-signal),transparent);margin:24px auto}

.msg{font-family:var(--font-display);font-size:clamp(22px,3vw,30px);font-weight:300;line-height:1.4;letter-spacing:-0.02em;color:var(--text);margin-bottom:12px}
.msg .accent{color:var(--signal)}

.sub{font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;color:var(--text-faint);text-transform:uppercase;margin-bottom:48px;display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
.sub .divider{color:var(--text-ghost)}
.sub .path{color:var(--text-dim)}

.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:10px;padding:14px 24px;font-family:var(--font-body);font-size:13px;font-weight:500;text-decoration:none;border-radius:3px;transition:all 0.25s;border:1px solid transparent}
.btn-arrow{font-family:var(--font-mono);transition:transform 0.25s}
.btn-primary{background:var(--signal);color:var(--bg);font-weight:600}
.btn-primary:hover{background:var(--signal-bright);transform:translateY(-1px);box-shadow:0 8px 24px rgba(94,234,212,0.25)}
.btn-primary:hover .btn-arrow{transform:translateX(-4px)}
.btn-ghost{background:transparent;color:var(--text);border-color:var(--line-2)}
.btn-ghost:hover{border-color:var(--signal);color:var(--signal);background:var(--signal-dim)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@media(max-width:640px){.chrome-inner{padding:10px 20px}.num-bracket{font-size:32px}.num-row{gap:12px}}
</style>
</head>
<body>

<header class="chrome">
  <div class="chrome-inner">
    <div class="brand">
      <svg viewBox="0 0 32 32" fill="none" stroke="#5eead4" stroke-width="1.5">
        <line x1="16" y1="4" x2="16" y2="12"/><line x1="16" y1="20" x2="16" y2="28"/>
        <line x1="4" y1="16" x2="12" y2="16"/><line x1="20" y1="16" x2="28" y2="16"/>
        <circle cx="16" cy="4" r="2" fill="#5eead4" stroke="none"/>
        <circle cx="16" cy="28" r="2" fill="#5eead4" stroke="none"/>
        <circle cx="4" cy="16" r="2" fill="#5eead4" stroke="none"/>
        <circle cx="28" cy="16" r="2" fill="#5eead4" stroke="none"/>
        <circle cx="16" cy="16" r="3" fill="#5eead4" stroke="none"/>
      </svg>
      <span>OKN<span class="slash">/</span><span class="studio">Studio</span></span>
    </div>
    <div class="err-code">ERR · <span class="val">RESOURCE_NOT_FOUND</span></div>
  </div>
</header>

<div class="wrap">
  <div class="status-tag"><span class="dot"></span>Signal Lost</div>

  <div class="num-row">
    <span class="num-bracket">[</span>
    <div class="num">4<span class="accent">0</span>4</div>
    <span class="num-bracket">]</span>
  </div>

  <div class="rule"></div>

  <p class="msg">
    This route does <span class="accent">not exist</span> on the network.
  </p>

  <div class="sub">
    <span>Probe Returned</span>
    <span class="divider">·</span>
    <span class="path">HTTP 404</span>
    <span class="divider">·</span>
    <span>Target Unreachable</span>
  </div>

  <div class="actions">
    <a href="/" class="btn btn-primary">
      <span class="btn-arrow">←</span>
      Return to Studio
    </a>
    <a href="/media/" class="btn btn-ghost">
      Go to Media
      <span class="btn-arrow">→</span>
    </a>
  </div>
</div>

</body>
</html>
