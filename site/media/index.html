<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Media Pool — OKN Studio</title>
<meta name="theme-color" content="#0a0f14">
<meta name="color-scheme" content="dark">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<link rel="mask-icon" href="/favicon.svg" color="#5eead4">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════
   OKN STUDIO / Media Pool
   Signal Studio aesthetic: tech console × archive
   ══════════════════════════════════════════════════════ */

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0a0f14;--bg-2:#0e141b;--bg-3:#121821;--bg-4:#1a2230;
  --signal:#5eead4;--signal-bright:#a7f3d0;--signal-dim:rgba(94,234,212,0.12);
  --signal-deep:#14b8a6;
  --info:#60a5fa;--warn:#fbbf24;--danger:#f87171;--purple:#a78bfa;
  --text:#e8edf2;--text-dim:rgba(232,237,242,0.72);
  --text-faint:rgba(232,237,242,0.55);--text-ghost:rgba(232,237,242,0.38);
  --line:rgba(255,255,255,0.06);--line-2:rgba(255,255,255,0.1);
  --line-signal:rgba(94,234,212,0.25);
  --surface:rgba(255,255,255,0.025);--surface-2:rgba(255,255,255,0.05);
  --font-display:'Sora',sans-serif;
  --font-body:'IBM Plex Sans','Noto Sans KR',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}

html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

body{
  font-family:var(--font-body);
  background:var(--bg);color:var(--text);
  min-height:100vh;line-height:1.5;
}

body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;
  mask-image:radial-gradient(ellipse at center,black 30%,transparent 85%);
}

/* ══════════════════════════════════════
   HEADER
   ══════════════════════════════════════ */

.header{
  position:sticky;top:0;z-index:50;
  background:rgba(10,15,20,0.8);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
}

.header-row{
  max-width:1600px;margin:0 auto;
  padding:12px 32px;
  display:flex;align-items:center;gap:16px;
}

.brand{
  display:flex;align-items:center;gap:10px;
  font-family:var(--font-mono);font-size:11px;
  color:var(--text);flex-shrink:0;
}
.brand svg{width:20px;height:20px}
.brand .slash{color:var(--text-ghost)}
.brand .studio{color:var(--signal)}

.back{
  display:flex;align-items:center;gap:8px;
  padding:7px 12px;text-decoration:none;
  color:var(--text-dim);
  font-family:var(--font-mono);font-size:10px;
  letter-spacing:0.12em;text-transform:uppercase;
  border:1px solid transparent;border-radius:3px;
  transition:all 0.2s;flex-shrink:0;
}
.back:hover{color:var(--signal);border-color:var(--line-2);background:var(--surface)}

.divider{width:1px;height:18px;background:var(--line);flex-shrink:0}

.title{
  font-family:var(--font-display);
  font-weight:500;font-size:18px;
  letter-spacing:-0.01em;color:var(--text);
  flex-shrink:0;
}
.title .accent{color:var(--signal)}

/* Breadcrumbs */
.breadcrumbs{
  display:flex;align-items:center;gap:2px;
  flex:1;min-width:0;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
  font-family:var(--font-mono);font-size:12px;
  padding:4px 0;
}
.breadcrumbs::-webkit-scrollbar{display:none}
.bc{
  color:var(--text-dim);text-decoration:none;
  cursor:pointer;padding:4px 10px;
  border-radius:3px;
  transition:all 0.15s;white-space:nowrap;
}
.bc:hover{color:var(--signal);background:var(--surface)}
.bc.active{color:var(--signal);background:var(--signal-dim)}
.bc-sep{color:var(--text-ghost);padding:0 2px;flex-shrink:0}

/* ══════════════════════════════════════
   TOOLBAR
   ══════════════════════════════════════ */

.toolbar{
  max-width:1600px;margin:0 auto;
  padding:20px 32px;
  display:flex;align-items:center;gap:14px;
  border-bottom:1px solid var(--line);
  flex-wrap:wrap;
}

.search-wrap{
  flex:1;min-width:240px;max-width:420px;
  position:relative;
}
.search-wrap input{
  width:100%;padding:11px 14px 11px 40px;
  background:var(--bg-3);
  border:1px solid var(--line-2);border-radius:3px;
  color:var(--text);
  font-family:var(--font-mono);font-size:12px;
  outline:none;transition:all 0.2s;
  letter-spacing:0.02em;
}
.search-wrap input:focus{
  border-color:var(--signal);
  box-shadow:0 0 0 3px var(--signal-dim);
}
.search-wrap input::placeholder{color:var(--text-ghost);letter-spacing:0.04em}
.search-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--signal);font-family:var(--font-mono);font-size:14px;
  pointer-events:none;opacity:0.7;
}

.search-kbd{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  padding:2px 6px;
  border:1px solid var(--line-2);border-radius:3px;
  font-family:var(--font-mono);font-size:10px;color:var(--text-faint);
  pointer-events:none;
  background:var(--bg-2);
}

.toolbar-spacer{flex:1}

.stats{
  font-family:var(--font-mono);font-size:10px;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--text-faint);
  display:flex;gap:12px;align-items:center;
}
.stats .val{color:var(--signal)}
.stats .divider-dot{color:var(--text-ghost)}

.view-toggle{
  display:flex;
  border:1px solid var(--line-2);border-radius:3px;
  overflow:hidden;
  background:var(--bg-3);
}
.vt{
  padding:8px 14px;
  background:none;border:none;
  color:var(--text-faint);
  font-family:var(--font-mono);font-size:14px;
  cursor:pointer;transition:all 0.15s;
  border-left:1px solid var(--line);
}
.vt:first-child{border-left:none}
.vt.active{background:var(--signal-dim);color:var(--signal)}
.vt:hover:not(.active){color:var(--text)}

/* ══════════════════════════════════════
   CONTENT
   ══════════════════════════════════════ */

.content{
  max-width:1600px;margin:0 auto;
  padding:28px 32px 80px;
  position:relative;z-index:1;
}

/* ── Grid ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:12px;
}
.grid .item{padding:16px 14px;flex-direction:column;align-items:flex-start}
.grid .item .item-thumb{width:100%;aspect-ratio:4/3;height:auto;font-size:32px;margin-bottom:12px}
.grid .item .item-info{width:100%;flex:none}
.grid .item .item-name{font-size:13px;margin-bottom:6px}
.grid .item .item-meta{flex-direction:row;flex-wrap:wrap}
.grid .item .item-actions{margin-top:12px;width:100%;justify-content:flex-end}

/* ── List ── */
.list{display:flex;flex-direction:column;gap:2px}
.list .item{
  flex-direction:row;align-items:center;
  padding:10px 14px;gap:14px;
}
.list .item .item-thumb{width:40px;height:40px;font-size:18px;margin-bottom:0;flex-shrink:0;aspect-ratio:1}
.list .item .item-info{flex:1;min-width:0}
.list .item .item-meta{margin-top:3px}
.list .item .item-actions{margin-top:0;flex-shrink:0}

/* ── Item (shared) ── */
.item{
  display:flex;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:4px;
  cursor:pointer;
  text-decoration:none;color:inherit;
  transition:all 0.2s cubic-bezier(0.2,0.8,0.2,1);
  position:relative;overflow:hidden;
}
.item:hover{
  border-color:var(--line-signal);
  background:var(--surface-2);
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
}

.item.folder{
  border-color:rgba(94,234,212,0.08);
  background:rgba(94,234,212,0.02);
}
.item.folder:hover{border-color:var(--line-signal);background:rgba(94,234,212,0.05)}

.item-thumb{
  border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-3);
  color:var(--signal);
  overflow:hidden;
  font-family:var(--font-mono);
  position:relative;
}
.item-thumb img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.item.folder .item-thumb{background:var(--signal-dim)}

.item-info{min-width:0}
.item-name{
  font-family:var(--font-body);
  font-size:14px;font-weight:500;
  color:var(--text);letter-spacing:-0.005em;
  line-height:1.3;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.item-meta{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-top:4px;
  font-family:var(--font-mono);font-size:10px;
  letter-spacing:0.04em;
  color:var(--text-faint);
}

.tag{
  padding:2px 7px;
  border-radius:2px;
  font-family:var(--font-mono);font-size:9px;
  font-weight:500;letter-spacing:0.14em;
  text-transform:uppercase;
  border:1px solid transparent;
}
.tag-image{background:rgba(96,165,250,0.1);color:var(--info);border-color:rgba(96,165,250,0.2)}
.tag-video{background:rgba(248,113,113,0.08);color:var(--danger);border-color:rgba(248,113,113,0.2)}
.tag-audio{background:rgba(167,139,250,0.08);color:var(--purple);border-color:rgba(167,139,250,0.2)}
.tag-document{background:rgba(94,234,212,0.08);color:var(--signal);border-color:rgba(94,234,212,0.2)}
.tag-design{background:rgba(251,191,36,0.08);color:var(--warn);border-color:rgba(251,191,36,0.25)}
.tag-archive{background:rgba(160,160,160,0.08);color:#999;border-color:rgba(160,160,160,0.15)}
.tag-other{background:rgba(160,160,160,0.05);color:#888;border-color:rgba(160,160,160,0.1)}
.tag-folder{background:var(--signal-dim);color:var(--signal);border-color:var(--line-signal)}

.item-actions{display:flex;gap:4px}
.abtn{
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-3);
  border:1px solid var(--line-2);
  border-radius:3px;
  color:var(--text-dim);
  cursor:pointer;
  transition:all 0.15s;
  text-decoration:none;
  font-family:var(--font-mono);font-size:11px;
}
.abtn:hover{background:var(--signal);color:var(--bg);border-color:var(--signal)}

/* Type glyphs in thumbs (list-size) */
.item-thumb .glyph-svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.grid .item-thumb .glyph-svg{width:32px;height:32px;stroke-width:1.2}

/* ══════════════════════════════════════
   LOADING / EMPTY / ERROR
   ══════════════════════════════════════ */

.loading{
  text-align:center;padding:120px 24px;
  color:var(--text-faint);
  font-family:var(--font-mono);font-size:11px;
  letter-spacing:0.18em;text-transform:uppercase;
}
.spinner{
  display:inline-block;width:32px;height:32px;
  border:2px solid var(--line);
  border-top-color:var(--signal);
  border-radius:50%;
  animation:spin 0.9s linear infinite;
  margin-bottom:20px;
}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{
  text-align:center;padding:120px 24px;
}
.empty-mark{
  font-family:var(--font-mono);
  font-size:56px;color:var(--signal);
  opacity:0.3;line-height:1;margin-bottom:28px;
  letter-spacing:-0.04em;
}
.empty h3{
  font-family:var(--font-display);
  font-size:26px;font-weight:400;
  color:var(--text);letter-spacing:-0.015em;
  margin-bottom:10px;
}
.empty p{
  font-family:var(--font-mono);font-size:11px;
  color:var(--text-faint);letter-spacing:0.1em;
  text-transform:uppercase;max-width:40ch;margin:0 auto;
  line-height:1.6;
}

.error-box{
  max-width:520px;margin:80px auto;
  padding:32px 36px;
  background:rgba(248,113,113,0.04);
  border:1px solid rgba(248,113,113,0.2);
  border-radius:4px;
  text-align:center;
  position:relative;
}
.error-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--danger),transparent);
}
.error-box h3{
  font-family:var(--font-display);font-size:20px;font-weight:500;
  color:var(--danger);margin-bottom:8px;
}
.error-box p{
  font-family:var(--font-mono);font-size:11px;
  color:var(--text-dim);letter-spacing:0.04em;
  margin-bottom:20px;word-break:break-word;
}
.retry{
  padding:10px 20px;
  background:transparent;
  border:1px solid var(--danger);
  color:var(--danger);
  font-family:var(--font-mono);font-size:10px;
  letter-spacing:0.16em;text-transform:uppercase;
  cursor:pointer;
  transition:all 0.2s;
  border-radius:3px;
}
.retry:hover{background:rgba(248,113,113,0.1);color:#fca5a5}

.load-more{display:flex;justify-content:center;padding:32px 0}
.load-more-btn{
  padding:12px 28px;
  background:transparent;
  border:1px solid var(--line-signal);
  color:var(--signal);
  font-family:var(--font-mono);font-size:11px;
  letter-spacing:0.16em;text-transform:uppercase;
  cursor:pointer;border-radius:3px;
  transition:all 0.2s;
}
.load-more-btn:hover{background:var(--signal);color:var(--bg);border-color:var(--signal)}

/* ══════════════════════════════════════
   PREVIEW MODAL
   ══════════════════════════════════════ */

.modal-overlay{
  position:fixed;inset:0;
  background:rgba(10,15,20,0.96);
  backdrop-filter:blur(16px);
  z-index:200;
  display:none;align-items:center;justify-content:center;
  padding:40px 80px;
}
.modal-overlay.active{display:flex}

.modal{
  max-width:100%;max-height:100%;
  display:flex;flex-direction:column;align-items:center;
  position:relative;gap:20px;
}

.modal-close{
  position:fixed;top:20px;right:20px;
  width:40px;height:40px;
  background:var(--bg-3);
  border:1px solid var(--line-2);
  border-radius:3px;
  color:var(--text);
  font-family:var(--font-mono);font-size:14px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:210;transition:all 0.2s;
}
.modal-close:hover{background:var(--signal);color:var(--bg);border-color:var(--signal)}

.modal-nav{
  position:fixed;top:50%;transform:translateY(-50%);
  width:44px;height:44px;
  background:var(--bg-3);
  border:1px solid var(--line-2);
  border-radius:3px;
  color:var(--text);
  font-family:var(--font-display);font-size:20px;font-weight:500;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:210;transition:all 0.2s;
}
.modal-nav:hover{background:var(--signal);color:var(--bg);border-color:var(--signal)}
.modal-prev{left:20px}
.modal-next{right:20px}

.modal img,.modal video{
  max-width:100%;max-height:70vh;
  border-radius:4px;object-fit:contain;
  border:1px solid var(--line);
  background:var(--bg-2);
}

.modal-footer{
  padding:16px 24px;
  background:var(--bg-2);
  border:1px solid var(--line);
  border-radius:4px;
  min-width:320px;max-width:560px;
  display:flex;justify-content:space-between;align-items:center;
  gap:20px;
}
.mf-body{min-width:0}
.mf-name{
  font-family:var(--font-display);font-size:15px;
  color:var(--text);font-weight:500;letter-spacing:-0.005em;
  margin-bottom:4px;
  word-break:break-all;line-height:1.3;
}
.mf-meta{
  font-family:var(--font-mono);font-size:10px;
  color:var(--text-faint);letter-spacing:0.1em;
  text-transform:uppercase;
}
.modal-dl{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 18px;
  background:var(--signal);color:var(--bg);
  font-family:var(--font-mono);font-size:10px;
  font-weight:600;letter-spacing:0.16em;
  text-transform:uppercase;text-decoration:none;
  border-radius:3px;
  transition:all 0.2s;flex-shrink:0;
}
.modal-dl:hover{background:var(--signal-bright);transform:translateY(-1px)}

/* ══════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════ */

@media(max-width:960px){
  .header-row{padding:12px 20px}
  .toolbar{padding:16px 20px}
  .content{padding:24px 20px 60px}
  .modal-nav{display:none}
  .modal-overlay{padding:20px}
}
@media(max-width:640px){
  .title{display:none}
  .divider:nth-of-type(2){display:none}
  .breadcrumbs{order:10;width:100%;margin-top:4px}
  .header-row{flex-wrap:wrap}
  .toolbar{gap:10px}
  .search-wrap{min-width:100%;order:1}
  .toolbar-spacer{display:none}
  .stats{order:2;font-size:9px}
  .view-toggle{order:3;margin-left:auto}
  .grid{grid-template-columns:1fr 1fr;gap:8px}
  .modal-close{top:12px;right:12px}
}

@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="header-row">
    <div class="brand">
      <svg viewBox="0 0 32 32" fill="none" stroke="#5eead4" stroke-width="1.5">
        <line x1="16" y1="4" x2="16" y2="12"/><line x1="16" y1="20" x2="16" y2="28"/>
        <line x1="4" y1="16" x2="12" y2="16"/><line x1="20" y1="16" x2="28" y2="16"/>
        <circle cx="16" cy="4" r="2" fill="#5eead4" stroke="none"/>
        <circle cx="16" cy="28" r="2" fill="#5eead4" stroke="none"/>
        <circle cx="4" cy="16" r="2" fill="#5eead4" stroke="none"/>
        <circle cx="28" cy="16" r="2" fill="#5eead4" stroke="none"/>
        <circle cx="16" cy="16" r="3" fill="#5eead4" stroke="none"/>
      </svg>
      <span>OKN<span class="slash">/</span><span class="studio">Studio</span></span>
    </div>
    <div class="divider"></div>
    <a href="/" class="back">← Studio</a>
    <div class="divider"></div>
    <div class="title">Media <span class="accent">Pool</span></div>
    <div class="divider"></div>
    <nav class="breadcrumbs" id="breadcrumbs"></nav>
  </div>
</header>

<!-- ── Toolbar ── -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Filter by name..." autocomplete="off">
    <span class="search-kbd">/</span>
  </div>
  <div class="toolbar-spacer"></div>
  <div class="stats" id="stats"></div>
  <div class="view-toggle">
    <button class="vt active" data-view="grid" title="Grid">▦</button>
    <button class="vt" data-view="list" title="List">≡</button>
  </div>
</div>

<!-- ── Content ── -->
<main class="content" id="content">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Loading archive</div>
  </div>
</main>

<!-- ── Preview Modal ── -->
<div class="modal-overlay" id="modal">
  <button class="modal-close" id="modal-close" title="Close (Esc)">✕</button>
  <button class="modal-nav modal-prev" id="modal-prev" title="Previous (←)">‹</button>
  <button class="modal-nav modal-next" id="modal-next" title="Next (→)">›</button>
  <div class="modal" id="modal-body"></div>
</div>

<script>
// ══════════════════════════════════════
// CONFIG — SVG glyphs per type
// ══════════════════════════════════════

const GLYPH_SVG = {
  folder: `<svg class="glyph-svg" viewBox="0 0 24 24"><path d="M3 6 L3 19 L21 19 L21 8 L12 8 L10 6 Z"/></svg>`,
  image:  `<svg class="glyph-svg" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="1.5"/><circle cx="8.5" cy="10" r="1.5"/><path d="M21 17 L16 12 L11 17 L8 14 L3 19"/></svg>`,
  video:  `<svg class="glyph-svg" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="1.5"/><path d="M10 9 L15 12 L10 15 Z" fill="currentColor"/></svg>`,
  audio:  `<svg class="glyph-svg" viewBox="0 0 24 24"><path d="M4 10 L4 14"/><path d="M8 7 L8 17"/><path d="M12 4 L12 20"/><path d="M16 7 L16 17"/><path d="M20 10 L20 14"/></svg>`,
  document: `<svg class="glyph-svg" viewBox="0 0 24 24"><path d="M6 3 L14 3 L19 8 L19 21 L6 21 Z"/><path d="M14 3 L14 8 L19 8"/><path d="M9 13 L16 13"/><path d="M9 17 L14 17"/></svg>`,
  design: `<svg class="glyph-svg" viewBox="0 0 24 24"><path d="M12 2 L15 9 L22 10 L17 15 L19 22 L12 18 L5 22 L7 15 L2 10 L9 9 Z"/></svg>`,
  archive: `<svg class="glyph-svg" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="5" rx="1"/><path d="M5 8 L5 21 L19 21 L19 8"/><path d="M10 13 L14 13"/></svg>`,
  other:  `<svg class="glyph-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8 L12 12"/><circle cx="12" cy="16" r="0.5" fill="currentColor"/></svg>`,
};

let prefix = '';
let view = 'grid';
let currentData = null;
let filterText = '';
let previewList = [];
let previewIndex = 0;

const cache = new Map();
const CACHE_TTL = 30 * 60 * 1000;

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  prefix = hashToPrefix();
  load(prefix);
  setupUI();
});

window.addEventListener('hashchange', () => {
  prefix = hashToPrefix();
  load(prefix);
});

function hashToPrefix() {
  const h = location.hash.slice(1);
  if (!h) return '';
  try { return decodeURIComponent(h); } catch { return h; }
}

function go(p) { location.hash = p ? '#' + encodeURIComponent(p) : ''; }

// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════

async function load(pfx, appendCursor) {
  const content = document.getElementById('content');
  if (!appendCursor) {
    content.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading archive</div></div>';
    renderBreadcrumbs(pfx);
  }

  const cacheKey = pfx + '|' + (appendCursor || '');
  const c = cache.get(cacheKey);
  if (c && Date.now() - c.t < CACHE_TTL) { render(c.d, appendCursor); return; }

  try {
    let url = '/api/media/list?prefix=' + encodeURIComponent(pfx);
    if (appendCursor) url += '&cursor=' + encodeURIComponent(appendCursor);
    const res = await fetch(url);
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error || e.detail || 'HTTP ' + res.status);
    }
    const data = await res.json();
    cache.set(cacheKey, { d: data, t: Date.now() });
    render(data, appendCursor);
  } catch (err) {
    content.innerHTML = `
      <div class="error-box">
        <h3>Connection failed</h3>
        <p>${esc(err.message)}</p>
        <button class="retry" onclick="load(prefix)">Retry</button>
      </div>`;
  }
}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════

function render(data, appendCursor) {
  const content = document.getElementById('content');
  const stats = document.getElementById('stats');

  if (appendCursor && currentData) {
    currentData.files = currentData.files.concat(data.files);
    currentData.folders = currentData.folders.concat(data.folders);
    currentData.cursor = data.cursor;
    currentData.truncated = data.truncated;
    currentData.count += data.count;
    currentData.folderCount += data.folderCount;
  } else {
    currentData = data;
  }

  const d = currentData;
  const total = d.folderCount + d.count;

  if (total === 0) {
    content.innerHTML = `
      <div class="empty">
        <div class="empty-mark">∅</div>
        <h3>Empty folder</h3>
        <p>Upload media through Cyberduck or rclone — new files will appear here.</p>
      </div>`;
    stats.textContent = '';
    return;
  }

  const parts = [];
  if (d.folderCount) parts.push(`<span class="val">${d.folderCount}</span> folder${d.folderCount !== 1 ? 's' : ''}`);
  if (d.count) parts.push(`<span class="val">${d.count}</span> file${d.count !== 1 ? 's' : ''}`);
  stats.innerHTML = parts.join('<span class="divider-dot">·</span>');

  const container = document.createElement('div');
  container.className = view;

  const filter = filterText.toLowerCase();
  previewList = [];

  for (const f of d.folders) {
    const name = f.replace(d.prefix, '').replace(/\/$/, '');
    if (filter && !name.toLowerCase().includes(filter)) continue;
    container.appendChild(mkFolder(f, name));
  }

  for (const f of d.files) {
    const name = f.key.replace(d.prefix, '');
    if (filter && !name.toLowerCase().includes(filter)) continue;
    if (['image','video','audio'].includes(f.type)) previewList.push(f);
    container.appendChild(mkFile(f, name));
  }

  content.innerHTML = '';
  content.appendChild(container);

  if (d.truncated && d.cursor) {
    const lm = document.createElement('div');
    lm.className = 'load-more';
    lm.innerHTML = '<button class="load-more-btn">Load more →</button>';
    lm.querySelector('button').onclick = () => { lm.remove(); load(prefix, d.cursor); };
    content.appendChild(lm);
  }

  lazyThumbs();
}

function mkFolder(path, name) {
  const el = document.createElement('div');
  el.className = 'item folder';
  el.onclick = () => go(path);
  el.innerHTML = `
    <div class="item-thumb">${GLYPH_SVG.folder}</div>
    <div class="item-info">
      <div class="item-name">${esc(name)}</div>
      <div class="item-meta">
        <span class="tag tag-folder">Folder</span>
      </div>
    </div>`;
  return el;
}

function mkFile(file, name) {
  const el = document.createElement('div');
  el.className = 'item';
  const canPreview = ['image','video','audio'].includes(file.type);
  const isImg = file.type === 'image';
  const src = '/api/media/download/' + encodePath(file.key);
  const date = file.modified ? new Date(file.modified).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '';
  const glyph = GLYPH_SVG[file.type] || GLYPH_SVG.other;

  el.innerHTML = `
    <div class="item-thumb"${isImg ? ' data-thumb="' + attr(src) + '"' : ''}>
      ${isImg ? '' : glyph}
    </div>
    <div class="item-info">
      <div class="item-name" title="${attr(name)}">${esc(name)}</div>
      <div class="item-meta">
        <span class="tag tag-${file.type}">${file.type}</span>
        <span>${file.sizeFormatted}</span>
        ${date ? `<span>· ${date}</span>` : ''}
      </div>
    </div>
    <div class="item-actions">
      ${canPreview ? `<button class="abtn" data-preview="${attr(file.key)}" title="Preview">◉</button>` : ''}
      <a class="abtn" href="${attr(src)}?download" title="Download" onclick="event.stopPropagation()">↓</a>
    </div>`;

  if (canPreview) {
    el.onclick = (e) => { if (!e.target.closest('a')) openPreview(file.key); };
    const btn = el.querySelector('[data-preview]');
    if (btn) btn.onclick = (e) => { e.stopPropagation(); openPreview(file.key); };
  }

  return el;
}

// ══════════════════════════════════════
// BREADCRUMBS
// ══════════════════════════════════════

function renderBreadcrumbs(pfx) {
  const nav = document.getElementById('breadcrumbs');
  const parts = pfx.split('/').filter(Boolean);
  let html = `<span class="bc${parts.length ? '' : ' active'}" onclick="go('')">~/root</span>`;
  let p = '';
  for (let i = 0; i < parts.length; i++) {
    p += parts[i] + '/';
    html += `<span class="bc-sep">/</span><span class="bc${i === parts.length - 1 ? ' active' : ''}" onclick="go('${attr(p)}')">${esc(parts[i])}</span>`;
  }
  nav.innerHTML = html;
  nav.scrollLeft = nav.scrollWidth;
}

// ══════════════════════════════════════
// THUMBNAILS
// ══════════════════════════════════════

function lazyThumbs() {
  const els = document.querySelectorAll('[data-thumb]');
  if (!els.length) return;
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const el = e.target, src = el.dataset.thumb;
      const img = new Image();
      img.onload = () => { el.innerHTML = ''; el.appendChild(img); };
      img.onerror = () => { el.innerHTML = GLYPH_SVG.image; };
      img.src = src;
      img.alt = '';
      obs.unobserve(el);
    });
  }, { rootMargin: '100px' });
  els.forEach(el => obs.observe(el));
}

// ══════════════════════════════════════
// PREVIEW
// ══════════════════════════════════════

function openPreview(key) {
  previewIndex = previewList.findIndex(f => f.key === key);
  if (previewIndex < 0) previewIndex = 0;
  showPreview();
}

function showPreview() {
  const file = previewList[previewIndex];
  if (!file) return;
  const overlay = document.getElementById('modal');
  const body = document.getElementById('modal-body');
  const src = '/api/media/download/' + encodePath(file.key);
  const name = file.key.split('/').pop();

  let media = '';
  if (file.type === 'image') media = `<img src="${attr(src)}" alt="${attr(name)}">`;
  else if (file.type === 'video') media = `<video src="${attr(src)}" controls autoplay playsinline></video>`;
  else if (file.type === 'audio') media = `<div style="padding:48px;border:1px solid var(--line);border-radius:4px;background:var(--bg-2);color:var(--signal)">${GLYPH_SVG.audio.replace('glyph-svg','').replace('width="24" height="24"','width="80" height="80"')}</div><audio src="${attr(src)}" controls autoplay style="filter:invert(0.9) hue-rotate(140deg)"></audio>`;

  body.innerHTML = `
    ${media}
    <div class="modal-footer">
      <div class="mf-body">
        <div class="mf-name">${esc(name)}</div>
        <div class="mf-meta">${file.sizeFormatted} · ${file.type}${previewList.length > 1 ? ` · ${previewIndex + 1} of ${previewList.length}` : ''}</div>
      </div>
      <a class="modal-dl" href="${attr(src)}?download">↓ Download</a>
    </div>`;

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
  updateNav();
}

function updateNav() {
  document.getElementById('modal-prev').style.display = previewList.length > 1 && previewIndex > 0 ? 'flex' : 'none';
  document.getElementById('modal-next').style.display = previewList.length > 1 && previewIndex < previewList.length - 1 ? 'flex' : 'none';
}

function closeModal() {
  const overlay = document.getElementById('modal');
  const body = document.getElementById('modal-body');
  body.querySelectorAll('video,audio').forEach(el => { el.pause(); el.src = ''; });
  overlay.classList.remove('active');
  body.innerHTML = '';
  document.body.style.overflow = '';
}

// ══════════════════════════════════════
// SETUP
// ══════════════════════════════════════

function setupUI() {
  // View toggle
  document.querySelectorAll('.vt[data-view]').forEach(btn => {
    btn.onclick = () => {
      view = btn.dataset.view;
      document.querySelectorAll('.vt[data-view]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (currentData) render(currentData);
    };
  });

  // Search
  let searchTimer;
  const searchEl = document.getElementById('search');
  searchEl.addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      filterText = e.target.value.trim();
      if (currentData) render(currentData);
    }, 180);
  });

  // Shortcut: / to focus search
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === '/' && !document.getElementById('modal').classList.contains('active')) {
      e.preventDefault();
      searchEl.focus();
    }
  });

  // Modal
  document.getElementById('modal-close').onclick = closeModal;
  document.getElementById('modal').onclick = (e) => { if (e.target.id === 'modal') closeModal(); };
  document.getElementById('modal-prev').onclick = () => { if (previewIndex > 0) { previewIndex--; showPreview(); } };
  document.getElementById('modal-next').onclick = () => { if (previewIndex < previewList.length - 1) { previewIndex++; showPreview(); } };
  document.addEventListener('keydown', (e) => {
    if (!document.getElementById('modal').classList.contains('active')) return;
    if (e.key === 'Escape') closeModal();
    else if (e.key === 'ArrowLeft' && previewIndex > 0) { previewIndex--; showPreview(); }
    else if (e.key === 'ArrowRight' && previewIndex < previewList.length - 1) { previewIndex++; showPreview(); }
  });
}

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════

function encodePath(p) { return p.split('/').map(encodeURIComponent).join('/'); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function attr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;'); }
</script>
</body>
</html>
